<!DOCTYPE html>
<html lang="en">
<head>





<meta charset="UTF-8">
<title>PyNugget</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
html { color-scheme: dark; }
body {
  background: #111827;
  color: #e5e7eb;
  font-family: system-ui, sans-serif;
  min-height: 100vh;
}
header {
  background: #020617;
  border-bottom: 1px solid #1f2937;
  padding: 0.75rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-size: 1.5rem;
  font-weight: bold;
  color: #3b82f6;
}
.user-area button,
.user-area span {
  background: #111827;
  border: 1px solid #374151;
  color: #e5e7eb;
  padding: 0.5rem 1rem;
  border-radius: 0.375rem;
  cursor: pointer;
  font-size: 0.95rem;
}
.user-area button:hover {
  background: #1f2937;
  border-color: #3b82f6;
}
main {
  padding: 4rem 2rem;
  text-align: center;
}
h1 {
  font-size: 3rem;
  margin-bottom: 1rem;
}
p {
  font-size: 1.25rem;
  color: #9ca3af;
  max-width: 600px;
  margin: 0 auto 2rem;
}
.btn {
  display: inline-block;
  background: #3b82f6;
  color: white;
  padding: 0.85rem 2rem;
  border-radius: 0.5rem;
  text-decoration: none;
  font-weight: 600;
}
.btn:hover { background: #2563eb; }
</style>
</head>
<body>

<header>
  <div class="logo">PyNugget</div>
  <div id="user-area" class="user-area">
    <button id="auth-btn" onclick="handleAuth()">Login or Sign Up</button>
  </div>
</header>

<main>
  <h1>Welcome to PyNugget</h1>
  <p>Code, run, and share Python games directly in your browser.</p>
  <p>Online Features still in progress.</p>
  <a href="/pynugget/editor" class="btn">Start New Project</a>
  <p></p>
  <p>Learn about PyNugget here:</p>
  <a href="/pynugget/documentation" class="btn">Documentation</a>
  <p><br>Or get PyNugget code snippets here:</p>
  <a href="/pynugget/nuggets" class="btn">Nuggets</a>
    
</main>





    
<script>
function updateHeader() {
  const user = document.cookie.split('; ').find(row => row.startsWith('session_user='));
  const username = user ? user.split('=')[1] : null;
  
  const display = document.getElementById('username-display');
  const btn = document.getElementById('auth-btn');
  
  if (username) {
    display.textContent = username;
    btn.textContent = 'Logout';
    btn.onclick = () => {
      document.cookie = 'session_user=; Max-Age=0';
      location.reload();
    };
  } else {
    display.textContent = '';
    btn.textContent = 'Login or Sign Up';
    btn.onclick = () => location.href = '/login'; // adjust path
  }
}

updateHeader();
console.log(document.cookie);  // check in console
</script>
