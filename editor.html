<!DOCTYPE html>
<html lang="en">
<head>

  







<meta charset="UTF-8" />
<title>Python Editor + Stage + Console</title>

      <button id="documentBtn" class="icon-btn" title="Documentation">

    </a>
  </div>
  <div class="theme-picker">
    Theme:
    <select id="themeSelect">
      <option value="material-darker">VS-like Dark</option>
      <option value="material">Material</option>
      <option value="monokai">Monokai</option>
      <option value="neo">Neo (light)</option>
    </select>
  </div>
</header>
<main>
  <section class="left-pane">
    <div class="tabs">
  <button class="tab-btn active" data-tab="codeTab">Code</button>
  <button class="tab-btn" data-tab="assetsTab">Assets</button>
</div>
    <div id="codeTab" class="tab-content active">
    <div class="editor-wrapper">
      <textarea id="editor">resize_stage(640,360)

print("Hello world")


def loop():
    clear_stage()
    
    render_text("Hello world", stage_width / 2, stage_height / 2, "center", 30, "Roboto", "#000000", "0px 2px 4px #00000000")

await forever(loop)</textarea>
    </div>
    </div>

  <div id="assetsTab" class="tab-content">
  <div class="assets-panel">
    <button id="addAssetBtn" class="icon-btn asset-upload-btn" title="Upload Image">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#e5e7eb" viewBox="0 0 256 256">
    <path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V144a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"/>
  </svg>
</button>
    <div id="assetList"></div>
  </div>
</div>
  </section>
  <section class="right-pane" id="rightPane">
    <div class="controls">
      <button id="runBtn" disabled>Run</button>
      <button id="stopBtn">Stop</button>
      <button id="fullscreenBtn">Fullscreen</button>
      <span id="statusText">Loading Python…</span>
      <span id="mousePos"> 0,0</span>
    </div>
    <div id="stage" class="stage" tabindex="0"><div id="stageLoading" class="stage-loading">Loading . . .</div></div>
    <div class="console">
      <div class="console-title">Console
      </div>
      <div id="consoleOutput">(no output yet)</div>
      <button id="scrollToBottom">↓ Back to bottom</button>
    </div>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="editor.js"></script>
</body>
</html>
